# ============================================================
# Nina IA - Arquivo de configuracao central
# Nunca faca hardcode de credenciais ou parametros no codigo.
# ============================================================

# --- Speech-to-Text (STT) ---------------------------------
stt:
  # Modelo WhisperX: tiny, base, small, medium, large-v3
  model_name: "small"
  # Dispositivo: "cuda" para GPU NVIDIA, "cpu" para sem GPU
  device: "cuda"
  # Tipo de computacao: "float16" para GPU, "int8" para CPU
  compute_type: "float16"
  # Idioma forcado (null = deteccao automatica)
  language: "pt"
  # Tamanho do batch para WhisperX
  batch_size: 16
  # Indice do dispositivo de entrada de audio (null usa o padrao do sistema)
  device_index: 3

# --- Voice Activity Detection (VAD) -----------------------
vad:
  # Taxa de amostragem em Hz (silero-vad aceita 8000 ou 16000)
  sample_rate: 16000
  # Tamanho do chunk em amostras (512 = 32ms a 16kHz)
  chunk_size: 512
  # Limiar de confianca para fala (0.0 a 1.0)
  threshold: 0.5
  # Duracao minima de silencio para considerar fim da fala (ms)
  min_silence_duration_ms: 700
  # Padding de fala (ms)
  speech_pad_ms: 300

# --- Text-to-Speech (TTS) ---------------------------------
tts:
  # Provider ativo de TTS: "edge" ou "kokoro"
  provider: "edge"
  # Voz neural Edge TTS
  edge_voice: "pt-BR-FranciscaNeural"
  # Taxa de fala Edge TTS
  edge_rate: "-10%"
  # Ajuste de pitch Edge TTS
  edge_pitch: "+0Hz"
  # Voz e idioma do Kokoro (fallback)
  kokoro_voice: "pf_dora"
  kokoro_lang: "p"
  # Compatibilidade com implementacoes antigas do Kokoro
  lang_code: "p"
  voice: "pf_dora"
  # Velocidade de fala (1.0 = normal)
  speed: 1.0
  # Taxa de amostragem de saida do Kokoro
  sample_rate: 24000

# --- LLM (Gemini / Ollama) --------------------------------
llm:
  provider: "gemini"  # opcoes: "gemini" | "ollama"
  gemini_model: "gemini-2.0-flash"
  ollama_model: "llama3"
  ollama_url: "http://localhost:11434"
  # API key: definida no arquivo .env (carregada automaticamente via python-dotenv)
  # Nunca coloque a API key diretamente neste arquivo!
  temperature: 0.7
  max_tokens: 1024
  # Numero maximo de mensagens no historico de conversa
  max_history: 20
  # Numero de tentativas em caso de erro na API
  max_retries: 3
  # Habilitar streaming de resposta (tokens impressos conforme chegam)
  streaming: true
  # System prompt - personalidade da Nina
  system_prompt: >
    REGRA CRITICA: Suas respostas sao convertidas em audio. Responda SEMPRE com no maximo 2 frases curtas e diretas, nunca ultrapassando 30 palavras. Use linguagem coloquial brasileira. Nunca use listas, bullets ou markdown.
    Voce e Nina, uma assistente pessoal inteligente e direta com personalidade de amiga proxima.

# --- Memoria (RAG com ChromaDB) ---------------------------
memory:
  # Habilitar memoria de longo prazo
  enabled: true
  backend: "chromadb"
  # Diretorio para persistencia do ChromaDB
  persist_directory: "./data/memory"
  # Nome da colecao no ChromaDB
  collection_name: "nina_memory"
  # Modelo de embeddings (sentence-transformers)
  embedding_model: "paraphrase-multilingual-MiniLM-L12-v2"
  # Numero de memorias retornadas por busca
  n_results: 3
  # Prompt para resumir conversas antes de salvar
  summary_prompt: >
    Resuma a seguinte troca de conversa em 1-2 frases curtas em portugues,
    capturando apenas a informacao essencial que seria util lembrar no futuro:

# --- Visao de tela (multimodal) ---------------------------
vision:
  # Habilitar modulo de visao
  enabled: true
  # Modelo Gemini para analise de imagem
  model: "gemini-2.0-flash"
  # Modo de ativacao: "manual" ou "auto"
  mode: "manual"
  # Intervalo de captura automatica em segundos (modo auto)
  auto_interval_seconds: 30
  # Qualidade JPEG para compressao (1-100, menor = mais comprimido)
  compression_quality: 60
  # Largura maxima da imagem (redimensiona mantendo proporcao)
  max_width: 1280
  # Diretorio para screenshots temporarios
  screenshot_dir: "./data/screenshots"

# --- Avatar (VTube Studio) --------------------------------
avatar:
  enabled: True
  vtube_port: 8001
  plugin_name: "Nina IA"
  expressions:
    alegria: "Sorrir"
    tristeza: "Triste"
    surpresa: "Surpresa"
    raiva: "Raiva"
    neutro: "Neutro"
  keywords:
    alegria: ["otimo", "incrivel", "feliz", "parabens", "adorei", "maravilhoso", "que bom", "haha", "rsrs"]
    tristeza: ["sinto muito", "que pena", "triste", "infelizmente", "lamento", "pessimo"]
    surpresa: ["uau", "nossa", "serio", "nao acredito", "incrivel", "que surpresa"]
    raiva: ["absurdo", "ridiculo", "impossivel", "que raiva", "indignado"]

# --- Geral ------------------------------------------------
general:
  # Nivel de log: DEBUG, INFO, WARNING, ERROR
  log_level: "INFO"
  # Tempo maximo de gravacao para testes (segundos)
  test_record_seconds: 3
